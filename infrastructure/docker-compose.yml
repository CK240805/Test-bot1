version: '3.8'
services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
  db:
    image: timescale/timescaledb:latest-pg14
    environment:
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: securepass
      POSTGRES_DB: gold_trader
    ports:
      - "5432:5432"
  app:
    build: .
    environment:
      OANDA_API_KEY: ${OANDA_API_KEY}
      OANDA_ACCOUNT_ID: ${OANDA_ACCOUNT_ID}
      OANDA_ENV: ${OANDA_ENV}
      REDIS_HOST: redis
      DATABASE_URL: postgresql://trader:securepass@db:5432/gold_trader
    depends_on:
      - redis
      - db
